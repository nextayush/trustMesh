spring.application.name=shipment-service
server.port=8084

# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/quantum_provenance
spring.datasource.username=postgres
spring.datasource.password=postgres_password
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Kafka
spring.kafka.bootstrap-servers=localhost:29092
spring.kafka.consumer.group-id=shipment-service-group
spring.kafka.consumer.auto-offset-reset=earliest

# Internal service URLs
quantum-provenance.crypto-service.url=http://localhost:8081
quantum-provenance.storage-service.url=http://localhost:8082
quantum-provenance.blockchain-service.url=http://localhost:8083
